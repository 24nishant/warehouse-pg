name: WarehousePG CI

# =============================================================================
# Test configuration
# -----------------------------------------------------------------------------
# main is WHPG 7, so there is no detect-config job: the major version is fixed
# at 7, and the EL matrix / installcheck target are computed inline in each job
# (GitHub Actions matrices cannot read `env`, so the EL lists are literals).
#
#   push to main / WHPG_*_STABLE : EL 8 + 9, installcheck-world
#   PRs and ci/** branches       : EL 8,     installcheck-good
#   workflow_dispatch            : honors the el_version / installcheck_target inputs
#
# Every installcheck job runs under BOTH query optimizers (matrix `optimizer`:
# on = GPORCA, off = Postgres planner), forwarded to the sessions via PGOPTIONS.
# =============================================================================

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('[CI] Manual: {0} on {1}', inputs.test_type == 'all' && 'all tests' || inputs.test_type, inputs.el_version == 'all' && 'all EL versions' || format('EL{0}', inputs.el_version))
      || github.event_name == 'pull_request'
      && format('[CI] PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title)
      || format('[CI] Push {0}: {1}', github.ref_name, github.event.head_commit.message) }}

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Which tests to run'
        default: 'all'
        type: choice
        options:
          - all
          - installcheck
          - orca-unit-tests
      installcheck_target:
        description: 'Installcheck target (if installcheck selected)'
        default: 'installcheck-small'
        type: choice
        options:
          - installcheck-small
          - installcheck-good
          - installcheck-world
      el_version:
        description: 'Enterprise Linux version'
        default: '8'
        type: choice
        options:
          - 'all'
          - '7'
          - '8'
          - '9'
      debug_enabled:
        description: 'Enable tmate debugging on failure'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - 'WHPG_*_STABLE'
      - 'ci/**'           # Opt-in CI for feature branches (e.g., ci/my-feature)
  pull_request:
    branches:
      - main
      - 'WHPG_*_STABLE'

# Cancel in-progress runs when new commits are pushed to the same branch
# Exception: main and stable branch runs are never cancelled to ensure every merge is validated
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/WHPG_') }}

jobs:
  installcheck:
    name: installcheck / EL${{ matrix.el_version }} / optimizer=${{ matrix.optimizer }}
    if: github.event_name != 'workflow_dispatch' || inputs.test_type == 'all' || inputs.test_type == 'installcheck'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        # push to main/stable -> EL 8+9; PRs and ci/** -> EL 8; dispatch -> chosen version
        el_version: ${{ fromJson((github.event_name == 'workflow_dispatch' && (inputs.el_version == 'all' && '["8","9"]' || format('["{0}"]', inputs.el_version))) || ((github.ref_name == 'main' || startsWith(github.ref_name, 'WHPG_')) && '["8","9"]' || '["8"]')) }}
        # Run the suite under both optimizers: on = GPORCA, off = Postgres planner
        optimizer: ['on', 'off']
    container:
      image: ghcr.io/warehouse-pg/whpg7-${{ format('rocky{0}', matrix.el_version) }}-build
      options: --privileged
    env:
      WHPG_MAJORVERSION: '7'
      EL_VERSION: ${{ matrix.el_version }}
      # push to main/stable -> installcheck-world; PRs and ci/** -> installcheck-good; dispatch -> chosen target
      TEST_TARGET: ${{ (inputs.installcheck_target != '' && inputs.installcheck_target) || ((github.ref_name == 'main' || startsWith(github.ref_name, 'WHPG_')) && 'installcheck-world' || 'installcheck-good') }}
      WHPG_SRC: ${{ github.workspace }}
      RESULTS_DIR: /tmp/test-results

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Shallow clone, but fetch tags in the same pass so getversion's
          # `git describe` resolves the version without a full-history clone.
          fetch-depth: 1024
          fetch-tags: true

      - name: Container info
        run: |
          echo "OS: $(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')"
          echo "Arch: $(uname -m)"
          echo "GCC: $(gcc --version | head -1)"

      # Cache key formats:
      # - ccache: ccache-{job}-el{el_version}-whpg{whpg_major}-{github.sha}
      # - packages: packages-{job}-el{el_version}-whpg{whpg_major}-{workflow_hash}
      - name: Create ccache directory
        run: mkdir -p ~/.ccache
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-installcheck-el${{ matrix.el_version }}-whpg${{ env.WHPG_MAJORVERSION }}-${{ github.sha }}
          restore-keys: |
            ccache-installcheck-el${{ matrix.el_version }}-whpg${{ env.WHPG_MAJORVERSION }}-

      - name: Cache yum packages
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: packages-installcheck-el${{ matrix.el_version }}-whpg${{ env.WHPG_MAJORVERSION }}-${{ hashFiles('.github/workflows/whpg-ci.yml') }}

      - name: Install required packages
        run: |
          # All build and CI dependencies are pre-installed in the container image
          # (see dockerfiles/Dockerfile.el*). Only WHPG 6 needs additional packages.
          if [[ "${WHPG_MAJORVERSION}" == "6" ]]; then
            yum install -y --setopt=keepcache=1 python2-devel
          else
            if [[ ! -e /usr/bin/pytest && -e /usr/bin/pytest-3 ]]; then
              ln -s /usr/bin/pytest-3 /usr/bin/pytest
            fi
          fi

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=1G
          ccache --set-config=compression=true
          ccache --zero-stats

      # Note: --with-quicklz, --enable-mapreduce, and --with-pythonsrc-ext are recognized
      # only in whpg6. They produce "unrecognized options" warnings in whpg7 but don't
      # fail the build. Kept for compatibility with both versions using a single workflow.
      - name: Configure
        run: |
          CC='ccache gcc -m64' \
          CFLAGS='-O2 -g3' LDFLAGS='-Wl,--enable-new-dtags -Wl,--export-dynamic' \
          ./configure --with-quicklz --disable-gpperfmon --with-gssapi --enable-mapreduce --enable-orafce --enable-ic-proxy \
                      --enable-orca --with-libxml --with-pythonsrc-ext --with-uuid=e2fs --with-pgport=5432 --enable-tap-tests --with-llvm \
                      --enable-debug-extensions --with-perl --with-python --with-openssl --with-pam --with-ldap --with-includes="" \
                      --with-libraries="" --disable-rpath \
                      --prefix=/usr/local/greenplum-db-devel \
                      --mandir=/usr/local/greenplum-db-devel/man

      - name: Build
        id: build
        run: make -j$(nproc)

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Install
        id: install
        run: make install -j$(nproc)

      - name: Setup gpadmin user
        run: |
          # Create symlinks for easier navigation
          ln -s . gpdb_src                          # For concourse scripts compatibility
          ln -s "${WHPG_SRC}" /workspace            # Easy to remember path
          ln -s "${WHPG_SRC}" /home/gpadmin/gpdb_src  # Accessible from gpadmin home
          chown -h gpadmin:gpadmin /workspace /home/gpadmin/gpdb_src

          export TEST_OS=centos
          ./concourse/scripts/setup_gpadmin_user.bash
          chown -R gpadmin:gpadmin /usr/local/greenplum-db-devel
          chown -R gpadmin:gpadmin "${WHPG_SRC}"

          # Note: Environment variables (WHPG_SRC, WHPG_MAJORVERSION, etc.) are passed
          # via export + su (without login shell). Scripts source greenplum_path.sh and
          # gpdemo-env.sh explicitly rather than relying on .bash_profile.

      - name: Create demo cluster
        id: cluster
        run: |
          source concourse/scripts/common.bash
          export WITH_MIRRORS=true
          make_cluster

      - name: Run installcheck tests
        id: tests
        run: |
          export TEST_TARGET="${TEST_TARGET}"
          export MAKE_FLAGS="-k"
          export PGOPTIONS="-c optimizer=${{ matrix.optimizer }}"
          bash .github/scripts/run-installcheck.bash

      - name: Installcheck Summary
        if: always()
        run: |
          echo "## Installcheck Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| WHPG Version | ${WHPG_MAJORVERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| EL Version | ${EL_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Target | ${TEST_TARGET} |" >> $GITHUB_STEP_SUMMARY
          echo "| Optimizer | ${{ matrix.optimizer }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Step Results" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build.outcome == 'success' && '✅ passed' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Install | ${{ steps.install.outcome == 'success' && '✅ passed' || steps.install.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Demo Cluster | ${{ steps.cluster.outcome == 'success' && '✅ passed' || steps.cluster.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.tests.outcome == 'success' && '✅ passed' || steps.tests.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ccache Statistics" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          { ccache --show-stats 2>/dev/null | grep -iE "hit|miss|cache size|files in cache" >> $GITHUB_STEP_SUMMARY; } || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-el${{ matrix.el_version }}-optimizer-${{ matrix.optimizer }}
          path: |
            /tmp/test-results/
            src/test/regress/regression.diffs
            src/test/regress/results/
          if-no-files-found: ignore

      - name: Upload cluster logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-logs-el${{ matrix.el_version }}-optimizer-${{ matrix.optimizer }}
          path: |
            gpAux/gpdemo/datadirs/qddir/demoDataDir-1/log/
            gpAux/gpdemo/datadirs/dbfast*/demoDataDir*/log/
            /home/gpadmin/gpAdminLogs/
          if-no-files-found: ignore

      # action-tmate uses apt-get internally which doesn't work on Rocky Linux.
      # Manual installation via yum is required for this container.
      - name: Install tmate
        if: ${{ failure() && inputs.debug_enabled }}
        run: |
          yum install -y --setopt=keepcache=1 epel-release
          yum install -y --setopt=keepcache=1 tmate

      - name: Setup tmate session
        if: ${{ failure() && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
        with:
          install-dependencies: false

  orca-unit-tests:
    name: orca-unit-tests / EL${{ matrix.el_version }}
    if: github.event_name != 'workflow_dispatch' || inputs.test_type == 'all' || inputs.test_type == 'orca-unit-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # push to main/stable -> EL 8+9; PRs and ci/** -> EL 8; dispatch -> chosen version
        el_version: ${{ fromJson((github.event_name == 'workflow_dispatch' && (inputs.el_version == 'all' && '["8","9"]' || format('["{0}"]', inputs.el_version))) || ((github.ref_name == 'main' || startsWith(github.ref_name, 'WHPG_')) && '["8","9"]' || '["8"]')) }}
    container:
      image: ghcr.io/warehouse-pg/whpg7-${{ format('rocky{0}', matrix.el_version) }}-build
      options: --privileged
    env:
      WHPG_MAJORVERSION: '7'
      EL_VERSION: ${{ matrix.el_version }}
      WHPG_SRC: ${{ github.workspace }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Container info
        run: |
          echo "OS: $(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')"
          echo "Arch: $(uname -m)"
          echo "GCC: $(gcc --version | head -1)"
          echo "CMake: $(cmake --version | head -1)"

      - name: Create ccache directory
        run: mkdir -p ~/.ccache
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-orca-el${{ matrix.el_version }}-whpg${{ env.WHPG_MAJORVERSION }}-${{ github.sha }}
          restore-keys: |
            ccache-orca-el${{ matrix.el_version }}-whpg${{ env.WHPG_MAJORVERSION }}-

      - name: Cache yum packages
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: packages-orca-el${{ matrix.el_version }}-whpg${{ env.WHPG_MAJORVERSION }}-${{ hashFiles('.github/workflows/whpg-ci.yml') }}

      - name: Install build dependencies
        run: |
          # All build and CI dependencies are pre-installed in the container image
          # (see dockerfiles/Dockerfile.el*). Only WHPG 6 needs additional packages.
          if [[ "${WHPG_MAJORVERSION}" == "6" ]]; then
            yum install -y --setopt=keepcache=1 python2-devel
          fi

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache --zero-stats

      - name: Run ORCA unit tests
        id: tests
        run: bash .github/scripts/run-orca-tests.bash
        env:
          # For cmake builds (ORCA)
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
          # For autotools builds (xerces)
          CC: ccache gcc
          CXX: ccache g++

      - name: Show ccache stats
        run: ccache --show-stats

      - name: ORCA Unit Tests Summary
        if: always()
        run: |
          echo "## ORCA Unit Tests Summary 🧪" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| WHPG Version | ${WHPG_MAJORVERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| EL Version | ${EL_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Step Results" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ORCA Unit Tests | ${{ steps.tests.outcome == 'success' && '✅ passed' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ccache Statistics" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          { ccache --show-stats 2>/dev/null | grep -iE "hit|miss|cache size|files in cache" >> $GITHUB_STEP_SUMMARY; } || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: orca-test-results-el${{ matrix.el_version }}
          path: |
            src/backend/gporca/build*/Testing/
            src/backend/gporca/build*/CMakeFiles/CMakeOutput.log
            src/backend/gporca/build*/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

      # action-tmate uses apt-get internally which doesn't work on Rocky Linux.
      # Manual installation via yum is required for this container.
      - name: Install tmate
        if: ${{ failure() && inputs.debug_enabled }}
        run: |
          yum install -y --setopt=keepcache=1 epel-release
          yum install -y --setopt=keepcache=1 tmate

      - name: Setup tmate session
        if: ${{ failure() && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
        with:
          install-dependencies: false
